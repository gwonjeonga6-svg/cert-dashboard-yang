<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요양병원 4주기 인증 조사 대시보드</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a5f'/><rect x='42' y='20' width='16' height='60' rx='4' fill='white'/><rect x='20' y='42' width='60' height='16' rx='4' fill='white'/></svg>">
<style>
:root{--navy:#1e3a5f;--navy2:#16304f;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--gray:#94a3b8;--bg:#f0f4f8;--card:#ffffff;--border:#e2e8f0;--text:#1a202c;--text2:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.header{background:var(--navy);color:white;padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:200;}
.header h1{font-size:15px;font-weight:700;flex:1;}
.hinput{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:white;padding:5px 10px;font-size:13px;width:160px;outline:none;}
.hinput::placeholder{color:rgba(255,255,255,0.5);}
.hbtn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.hbtn-save{background:var(--green);color:white;}
.hbtn-load{background:#6366f1;color:white;}
.hbtn-reset{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);}
.tabs{background:var(--navy2);display:flex;padding:0 20px;position:sticky;top:56px;z-index:190;}
.tab{padding:11px 16px;color:rgba(255,255,255,0.6);cursor:pointer;font-size:13px;font-weight:600;border-bottom:3px solid transparent;}
.tab:hover{color:rgba(255,255,255,0.85);}
.tab.active{color:white;border-bottom-color:var(--green);}
.verdict{padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;font-weight:700;transition:all 0.3s;}
.v-cert{background:#d1fae5;color:#065f46;border-bottom:3px solid var(--green);}
.v-cond{background:#fef3c7;color:#92400e;border-bottom:3px solid var(--yellow);}
.v-fail{background:#fee2e2;color:#991b1b;border-bottom:3px solid var(--red);}
.v-wait{background:#f1f5f9;color:#475569;border-bottom:3px solid var(--gray);}
.vstats{margin-left:auto;display:flex;gap:16px;font-weight:400;font-size:12px;}
.vstat{text-align:center;}
.vstat strong{display:block;font-size:15px;font-weight:800;}
.content{padding:16px 20px;max-width:1100px;margin:0 auto;}
.ov-top{display:grid;grid-template-columns:200px 1fr;gap:14px;margin-bottom:14px;}
.gauge-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;text-align:center;}
.gauge-wrap{position:relative;width:120px;height:70px;margin:0 auto 10px;overflow:hidden;}
.gauge-svg{width:120px;height:120px;position:absolute;top:0;left:0;}
.gauge-num{position:absolute;bottom:0;left:0;right:0;font-size:20px;font-weight:800;text-align:center;}
.gauge-sub{font-size:11px;color:var(--text2);}
.gauge-title{font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:600;}
.conds{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cond{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px 14px;}
.cond-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.cond-lbl{font-size:11px;color:var(--text2);font-weight:600;}
.cbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.cb-ok{background:#d1fae5;color:#065f46;}
.cb-fail{background:#fee2e2;color:#991b1b;}
.cb-wait{background:#f1f5f9;color:#94a3b8;}
.cond-val{font-size:24px;font-weight:800;}
.cond-desc{font-size:10px;color:var(--text2);margin-top:2px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;text-align:center;}
.stat-val{font-size:22px;font-weight:800;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.stat-sub{font-size:10px;color:var(--text2);}
.chart-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:14px;}
.chart-title{font-size:13px;font-weight:700;margin-bottom:12px;}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:110px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-val{font-size:9px;font-weight:700;}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;}
.bar-lbl{font-size:8px;color:var(--text2);text-align:center;width:100%;line-height:1.3;}
.danger-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.danger-title{font-size:12px;font-weight:700;color:#991b1b;margin-bottom:6px;}
.warn-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.warn-title{font-size:12px;font-weight:700;color:#c2410c;margin-bottom:6px;}
.warn-item{font-size:12px;color:#9a3412;padding:2px 0;}
.input-layout{display:flex;gap:14px;}
.ch-sidebar{width:190px;flex-shrink:0;}
.ch-nav{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;position:sticky;top:110px;}
.nav-item{padding:8px 10px;cursor:pointer;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:6px;font-size:11px;}
.nav-item:hover{background:#f8fafc;}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-prog{margin-left:auto;font-size:10px;color:var(--text2);}
.chapters-area{flex:1;}
.ch-card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.ch-hdr{padding:11px 14px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;}
.ch-hdr h3{font-size:13px;font-weight:700;flex:1;}
.ch-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;}
.b-ok{background:#d1fae5;color:#065f46;}
.b-warn{background:#fef3c7;color:#92400e;}
.b-bad{background:#fee2e2;color:#991b1b;}
.b-none{background:#f1f5f9;color:#94a3b8;}
.ch-tog{color:var(--text2);font-size:12px;transition:transform 0.2s;}
.ch-tog.closed{transform:rotate(-90deg);}
.ch-prog{height:3px;background:#e2e8f0;}
.ch-prog-fill{height:100%;background:var(--green);transition:width 0.3s;}
.std-hdr{padding:7px 14px;background:#fafafa;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:6px;}
.std-nm{font-size:11px;color:var(--text2);font-weight:700;}
.std-avg{font-size:11px;font-weight:700;margin-left:auto;}
.std-avg.ok{color:var(--green);}
.std-avg.bad{color:var(--red);}
.na-btn{font-size:10px;padding:2px 7px;border-radius:8px;border:1px solid #cbd5e1;background:#f8fafc;color:#64748b;cursor:pointer;font-weight:600;}
.na-btn:hover{background:#94a3b8;color:white;border-color:#94a3b8;}
.me-row{padding:8px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #f8f9fa;}
.me-row:hover{background:#fafbff;}
.is-must{border-left:3px solid var(--yellow);}
.is-trial{opacity:0.6;}
.me-no{font-size:11px;font-weight:700;color:var(--blue);min-width:32px;}
.me-txt{flex:1;font-size:12px;line-height:1.5;}
.me-tags{display:flex;gap:3px;flex-shrink:0;}
.mtag{font-size:10px;padding:1px 5px;border-radius:7px;font-weight:600;}
.mt-S{background:#ede9fe;color:#6d28d9;}
.mt-P{background:#dbeafe;color:#1d4ed8;}
.mt-O{background:#d1fae5;color:#065f46;}
.mt-must{background:#fef3c7;color:#b45309;border:1px solid #fcd34d;}
.mt-trial{background:#f1f5f9;color:#94a3b8;}
.sbtns{display:flex;gap:3px;flex-shrink:0;}
.sbtn{width:32px;height:26px;border:1.5px solid var(--border);background:white;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);}
.sbtn:hover{border-color:var(--blue);color:var(--blue);}
.on-sang{background:var(--green);border-color:var(--green);color:white;}
.on-jung{background:var(--yellow);border-color:var(--yellow);color:white;}
.on-ha{background:var(--red);border-color:var(--red);color:white;}
.on-mi{background:var(--gray);border-color:var(--gray);color:white;}
.an-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.an-card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.an-hdr{padding:11px 14px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.an-title{font-size:12px;font-weight:700;flex:1;}
.an-score{font-size:17px;font-weight:800;}
.an-prog{height:5px;background:#e2e8f0;}
.an-fill{height:100%;transition:width 0.4s;}
.an-body{padding:10px 14px;}
.std-row2{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #f8f9fa;}
.std-row2:last-child{border:none;}
.std-nm2{font-size:10px;color:var(--text2);min-width:55px;}
.std-bar{flex:1;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;}
.std-bar-fill{height:100%;border-radius:5px;}
.std-sc2{font-size:10px;font-weight:700;min-width:30px;text-align:right;}
.std-cnt{font-size:9px;color:#94a3b8;min-width:32px;text-align:right;}
</style>
</head>
<body>
<div class="header">
  <h1>🏥 요양병원 4주기 인증 조사 대시보드</h1>
  <input class="hinput" id="hospName" placeholder="병원명을 입력하세요">
  <button class="hbtn hbtn-reset" id="btnReset">↺ 초기화</button>
  <button class="hbtn hbtn-load" id="btnLoad">📂 불러오기</button>
  <button class="hbtn hbtn-save" id="btnSave">💾 저장</button>
</div>
<input type="file" id="fi" accept=".json" style="display:none">
<div class="tabs">
  <div class="tab active" id="tab-ov" onclick="showTab('ov')">📊 종합현황</div>
  <div class="tab" id="tab-in" onclick="showTab('in')">✏️ 데이터 입력</div>
  <div class="tab" id="tab-an" onclick="showTab('an')">📈 장별 분석</div>
</div>
<div class="verdict v-wait" id="vbar">
  <span id="vicon">⏳</span>
  <span id="vtxt">항목을 입력하면 판정이 시작됩니다</span>
  <div class="vstats">
    <div class="vstat"><strong id="vs-avg">-</strong>전체 평균</div>
    <div class="vstat"><strong id="vs-inp">0/299</strong>입력</div>
    <div class="vstat"><strong id="vs-fail">0개</strong>위험 조건</div>
  </div>
</div>
<div id="pane-ov" style="display:block">
<div class="content">
  <div class="ov-top">
    <div class="gauge-card">
      <div class="gauge-title">총 점수 현황</div>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 120 120">
          <path d="M10 110 A50 50 0 0 1 110 110" fill="none" stroke="#e2e8f0" stroke-width="12" stroke-linecap="round"/>
          <path id="gaugePath" d="M10 110 A50 50 0 0 1 110 110" fill="none" stroke="#e2e8f0" stroke-width="12" stroke-linecap="round" stroke-dasharray="0 157"/>
        </svg>
        <div class="gauge-num" id="gaugeNum">-</div>
      </div>
      <div class="gauge-sub" id="gaugeSub">입력 대기 중</div>
    </div>
    <div class="conds">
      <div class="cond"><div class="cond-top"><span class="cond-lbl">📊 전체 평균점수</span><span class="cbadge cb-wait" id="c1b">대기</span></div><div class="cond-val" id="c1v">-</div><div class="cond-desc">기준: 8.0점 이상</div></div>
      <div class="cond"><div class="cond-top"><span class="cond-lbl">📋 기준 5점 미만</span><span class="cbadge cb-wait" id="c2b">대기</span></div><div class="cond-val" id="c2v">-</div><div class="cond-desc">기준: 3개 미만</div></div>
      <div class="cond"><div class="cond-top"><span class="cond-lbl">🏛️ 장별 7점 미만</span><span class="cbadge cb-wait" id="c3b">대기</span></div><div class="cond-val" id="c3v">-</div><div class="cond-desc">기준: 0개 (1개라도 불인증)</div></div>
      <div class="cond"><div class="cond-top"><span class="cond-lbl">⭐ 필수항목 하</span><span class="cbadge cb-wait" id="c4b">대기</span></div><div class="cond-val" id="c4v">-</div><div class="cond-desc">기준: 0개 (1개라도 불인증)</div></div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="cnt-sang" style="color:var(--green)">0</div><div class="stat-lbl">상 항목</div><div class="stat-sub" id="cnt-sang-p">-</div></div>
    <div class="stat-card"><div class="stat-val" id="cnt-jung" style="color:var(--yellow)">0</div><div class="stat-lbl">중 항목 (개선 필요)</div><div class="stat-sub" id="cnt-jung-p">-</div></div>
    <div class="stat-card"><div class="stat-val" id="cnt-ha" style="color:var(--red)">0</div><div class="stat-lbl">하 항목 (즉시 개선)</div><div class="stat-sub" id="cnt-ha-p">-</div></div>
    <div class="stat-card"><div class="stat-val" id="cnt-mi" style="color:var(--gray)">0</div><div class="stat-lbl">미해당</div><div class="stat-sub">점수 제외</div></div>
  </div>
  <div class="chart-card"><div class="chart-title">📊 장별 평균 점수 현황</div><div class="bar-chart" id="barChart"></div></div>
  <div id="dangerZone"></div>
  <div id="haZone"></div>
</div>
</div>
<div id="pane-in" style="display:none">
<div class="content">
  <div class="input-layout">
    <div class="ch-sidebar"><div class="ch-nav" id="chNav"></div></div>
    <div class="chapters-area" id="chapArea"></div>
  </div>
</div>
</div>
<div id="pane-an" style="display:none">
<div class="content"><div class="an-grid" id="anGrid"></div></div>
</div>

var MD = [{"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.1", "me": 1, "text": "\uc815\ud655\ud55c \ud658\uc790 \ud655\uc778 \ubc0f \uc758\uc0ac\uc18c\ud1b5\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\ud544\uc218", "id": "1.1.ME1"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.1", "me": 2, "text": "\ud658\uc790\ub97c \uc815\ud655\ud558\uac8c \ud655\uc778\ud55c\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "1.1.ME2"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.1", "me": 3, "text": "\uad6c\ub450\ucc98\ubc29\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "1.1.ME3"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.1", "me": 4, "text": "\ud544\uc694\uc2dc\ucc98\ubc29(p.r.n)\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "1.1.ME4"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.1", "me": 5, "text": "\ud544\uc694\uc2dc\ucc98\ubc29(p.r.n)\uc744 \uc548\uc804\ud558\uac8c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "1.1.ME5"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.1", "me": 6, "text": "\ud63c\ub3d9\ud558\uae30 \uc26c\uc6b4 \ubd80\uc815\ud655\ud55c \ucc98\ubc29 \uc2dc \ub300\ucc98\ubc29\uc548\uc744 \uc54c\uace0 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "1.1.ME6"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.2", "me": 1, "text": "\ub099\uc0c1 \uc608\ubc29\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\ud544\uc218", "id": "1.2.ME1"}, {"chapter": "1\uc7a5. \ud658\uc790\uc548\uc804\ubcf4\uc7a5\ud65c\ub3d9", "standard": "1.2", "me": 2, "text": "\ub099\uc0c1 \uc704\ud5d8 \ud3c9\uac00\ub3c4\uad6c\u c4\uc640 \ud3c9\uac00", "standard": "2.1.1", "me": 1, "text": "\uc678\ub798\ud658\uc790 \ub4f1\ub85d \uc808\ucc28\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.1.1.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.1", "me": 2, "text": "\uc678\ub798\ud658\uc790 \ub4f1\ub85d\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.1.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.1", "me": 3, "text": "\uc678\ub798\ub4f1\ub85d \ubc0f \uc758\ub8cc\uae30\uad00 \uc81c\uacf5 \uc11c\ube44\uc2a4\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.1.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.2", "me": 1, "text": "\uc785\uc6d0 \uc808\ucc28\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.1.2.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.2", "me": 2, "text": "\uc785\uc6d0\ud658\uc790 \ub4f1\ub85d \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.2.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.2", "me": 3, "text": "\uc785\uc6d0 \uc2dc \ud658\uc790\uc5d0\uac8c \ud544\uc694\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.2.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.2", "me": 4, "text": "\uc9c4\ub8cc\uc758\ub8b0\ub97c \ud1b5\ud55c \uc785\uc6d0\uc11c\ube44\uc2a4\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.2.ME4"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.3", "me": 2, "text": "\uc804\uacfc \uc2dc \uc758\ubb34\uae30\ub85d\uc744 \uc791\uc131\ud558\uc5ec \ud658\uc790 \uc0c1\ud0dc\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.3.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.3", "me": 3, "text": "\uc804\ub3d9 \uc2dc \uc758\ubb34\uae30\ub85d\uc744 \uc791\uc131\ud558\uc5ec \ud658\uc790 \uc0c1\ud0dc\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.3.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.3", "me": 4, "text": "\uadfc\ubb34\uad50\ub300 \uc2dc \ud658\uc790 \uc0c1\ud0dc\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.3.ME4"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.4", "me": 1, "text": "\ud1f4\uc6d0 \ubc0f \uc804\uc6d0\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.1.4.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.4", "me": 2, "text": "\ud1f4\uc6d0 \uc804\uc5d0 \ud1f4\uc6d0\uc694\uc57d\uc9c0\ub97c \uc791\uc131\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.4.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.4", "me": 3, "text": "\ud1f4\uc6d0 \uc2dc \ud544\uc694\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.4.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.1.4", "me": 4, "text": "\uc758\ub8b0 \ubc0f \uc804\uc6d0\uc11c\ube44\uc2a4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.1.4.ME4"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.1", "me": 1, "text": "\uc678\ub798\ud658\uc790 \ucd08\uae30\ud3c9\uac00\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.2.1.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.1", "me": 2, "text": "\ud0c0 \uc758\ub8cc\uae30\uad00\uc5d0\uc11c \uac00\uc838\uc628 \uc9c4\ub8cc \uc815\ubcf4\ub97c \ud655\uc778\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.1.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.1", "me": 3, "text": "\uc758\uc0ac\ub294 \uc678\ub798\ud658\uc790 \ucd08\uae30\ud3c9\uac00\ub97c \uc218\ud589\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.1.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 1, "text": "\uc785\uc6d0\ud658\uc790 \ucd08\uae30\ud3c9\uac00\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.2.2.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 2, "text": "\uc758\ud559\uc801 \ucd08\uae30\ud3c9\uac00\ub97c 24\uc2dc\uac04 \uc774\ub0b4 \uc218\ud589\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.2.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 3, "text": "\uac04\ud638 \ucd08\uae30\ud3c9\uac00\ub97c 24\uc2dc\uac04 \uc774\ub0b4 \uc218\ud589\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.2.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 4, "text": "\uc601\uc591 \ucd08\uae30\ud3c9\uac00\ub97c \uc218\ud589\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.2.ME4"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 5, "text": "\uc785\uc6d0\ud658\uc790\uc758 \uc758\ud559\uc801 \uc7ac\ud3c9\uac00\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.2.2.ME5"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 6, "text": "\uc785\uc6d0\ud658\uc790\uc758 \uc758\ud559\uc801 \uc7ac\ud3c9\uac00\ub97c \uc218\ud589\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.2.ME6"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.2.2", "me": 7, "text": "\ud658\uc790\ud3c9\uac00 \uae30\ub85d\uc744 \ud658\uc790 \uc9c4\ub8cc\ub97c \ub2f4\ub2f9\ud558\ub294 \uc9c1\uc6d0\uacfc \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.2.2.ME7"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 1, "text": "\uac80\uccb4\uac80\uc0ac \uc6b4\uc601\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.3.1.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 2, "text": "\uac80\uccb4\uac80\uc0ac\ub97c \uc2dc\ud589\ud558\ub294 \uc801\uaca9\ud55c \uc790\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.3.1.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 3, "text": "\uac80\uccb4\ub97c \uc548\uc804\ud558\uac8c \ud68d\ub4dd\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.3.1.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 4, "text": "\uc815\ud655\ud55c \uac80\uccb4\uac80\uc0ac\ub97c \uc704\ud55c \ud655\uc778 \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.3.1.ME4"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 5, "text": "\uac80\uccb4\uac80\uc0ac \uacb0\uacfc\ub97c \uc815\ud655\ud558\uace0 \uc2e0\uc18d\ud558\uac8c \ubcf4\uace0\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.3.1.ME5"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 6, "text": "\uac80\uc0ac\uacb0\uacfc \uc7ac\ud655\uc778\uc744 \uc704\ud55c \uac80\uccb4\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.3.1.ME6"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 7, "text": "\uc815\ub3c4\uad00\ub9ac\ub97c \uc218\ud589\ud558\uace0 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.3.1.ME7"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.1", "me": 8, "text": "\uac80\uccb4\uac80\uc0ac \uc678\ubd80 \uc758\ub8b0\uccb4\uacc4\ub97c \uc801\uc815\ud558\uac8c \ud65c\uc6a9\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "2.3.1.ME8"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.2", "me": 1, "text": "\uc601\uc0c1\uac80\uc0ac \uc6b4\uc601\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.3.2.ME1"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.2", "me": 2, "text": "\uc601\uc0c1\uac80\uc0ac\ub97c \uc2dc\ud589\ud558\ub294 \uc801\uaca9\ud55c \uc790\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.3.2.ME2"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec\uccb4\uacc4\uc640 \ud3c9\uac00", "standard": "2.3.2", "me": 3, "text": "\uc601\uc0c1\uac80\uc0ac \uacb0\uacfc\ub97c \ud310\ub3c5\ud558\ub294 \uc801\uaca9\ud55c \uc790\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "2.3.2.ME3"}, {"chapter": "2\uc7a5. \uc9c4\ub8cc\uc804\ub2ec a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.2", "me": 2, "text": "\uc758\ub8cc\uae30\uad00 \ub0b4 \ud0c0 \uc9c4\ub8cc\uacfc \ud611\uc758\uc9c4\ub8cc \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.2.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.2", "me": 3, "text": "\ud0c0 \uc758\ub8cc\uae30\uad00 \ud611\uc758\uc9c4\ub8cc \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.2.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.3", "me": 1, "text": "\ud1b5\uc99d\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.1.3.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.3", "me": 2, "text": "\uc678\ub798\ud658\uc790 \ud1b5\uc99d \ucd08\uae30\ud3c9\uac00\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.3.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.3", "me": 3, "text": "\uc785\uc6d0\ud658\uc790 \ud1b5\uc99d \ucd08\uae30\ud3c9\uac00\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.3.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.3", "me": 4, "text": "\ud1b5\uc99d\ud3c9\uac00 \uacb0\uacfc\uc5d0 \ub530\ub77c \ud1b5\uc99d\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.3.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.3", "me": 5, "text": "\uc785\uc6d0\ud658\uc790 \ud1b5\uc99d \uc7ac\ud3c9\uac00\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.3.ME5"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.4", "me": 1, "text": "\uc601\uc591\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.1.4.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.4", "me": 2, "text": "\ud658\uc790\uc758 \uce58\ub8cc\ubaa9\uc801\uc5d0 \ub9de\uac8c \uc2dd\uc0ac\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.4.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.4", "me": 3, "text": "\ud658\uc790\uc5d0\uac8c \uce58\ub8cc\uc2dd\uc5d0 \ub300\ud574 \uc124\uba85\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.4.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.4", "me": 4, "text": "\ud658\uc790\uc5d0\uac8c \uc601\uc591 \uc0c1\ub2f4\uc744 \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.4.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.5", "me": 1, "text": "\uc695\ucc3d \uc608\ubc29\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.1.5.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.5", "me": 2, "text": "\uc695\ucc3d \uc704\ud5d8 \ud3c9\uac00\ub3c4\uad6c\ub97c \uc774\uc6a9\ud558\uc5ec \ud658\uc790 \uc785\uc6d0 \uc2dc \ucd08\uae30\ud3c9\uac00\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.5.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.5", "me": 3, "text": "\uc695\ucc3d \uc704\ud5d8 \ud3c9\uac00\uc5d0 \ub530\ub77c \uace0\uc704\ud5d8\ud658\uc790\uc5d0 \ub300\ud55c \uc695\ucc3d \uc608\ubc29\ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.5.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.5", "me": 4, "text": "\uc695\ucc3d \uc704\ud5d8 \ud3c9\uac00\ub3c4\uad6c\ub97c \uc774\uc6a9\ud558\uc5ec \uc815\uae30\uc801\uc778 \uc7ac\ud3c9\uac00\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.5.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.5", "me": 5, "text": "\uc695\ucc3d\uc774 \ubc1c\uc0dd\ud55c \ud658\uc790\uc5d0\uac8c \uc695\ucc3d \uad00\ub9ac\ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.5.ME5"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.6", "me": 1, "text": "\uc0dd\uc560\ub9d0\uae30\ud658\uc790 \uc9c4\ub8cc\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.1.6.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.6", "me": 2, "text": "\uc9c1\uc6d0\uc740 \uc0dd\uc560\ub9d0\uae30\ud658\uc790 \uad00\ub9ac\uc5d0 \uad00\ud55c \uad50\uc721\uc744 \ubc1b\uace0, \uadf8 \ub0b4\uc6a9\uc744 \uc774\ud574\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.6.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.6", "me": 3, "text": "\uc0dd\uc560\ub9d0\uae30\ud658\uc790\uc758 \ud76c\ub9dd\uc744 \uace0\ub824\ud558\uc5ec \uc801\uc808\ud55c \ub300\uc99d\uce58\ub8cc\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.6.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.6", "me": 4, "text": "\uc0dd\uc560\ub9d0\uae30\ud658\uc790\uc5d0\uac8c \uc815\uc2e0\u318d\uc0ac\ud68c\uc801 \uc9c0\uc9c0\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.6.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.7", "me": 1, "text": "\uacb0\ud575 \uc608\ubc29\u318d\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.1.7.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.7", "me": 2, "text": "\uc785\uc6d0 \uc2dc \uacb0\ud575\uac80\uc9c4 \uacb0\uacfc\ub97c \ud655\uc778\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.7.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.7", "me": 3, "text": "\uc785\uc6d0\ud658\uc790\uc5d0 \ub300\ud574 \uacb0\ud575\uac80\uc9c4\uc744 \uc815\uae30\uc801\uc73c\ub85c \uc2e4\uc2dc\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.7.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.7", "me": 4, "text": "\uacb0\ud575\ud658\uc790 \ubc1c\uc0dd \uc2dc \uc801\uc808\ud558\uac8c \ub300\uc751\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.7.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.8", "me": 1, "text": "\ud55c\ubc29 \uc11c\ube44\uc2a4\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.1.8.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.8", "me": 2, "text": "\ud55c\ubc29 \uc11c\ube44\uc2a4\ub97c \uc548\uc804\ud558\uac8c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.8.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.8", "me": 3, "text": "\ud0d5\uc804\uc2e4\uc744 \uc548\uc804\ud558\uac8c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.8.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.1.8", "me": 4, "text": "\uc81c\ud658(\uc0b0)\uc2dc\uc124\uc744 \uc548\uc804\ud558\uac8c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.1.8.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.1", "me": 1, "text": "\uc2ec\ud3d0\uc18c\uc0dd\uc220\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.2.1.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.1", "me": 2, "text": "\uc2ec\ud3d0\uc18c\uc0dd\uc220\uc774 \uc694\uad6c\ub418\ub294 \ud658\uc790 \ubc1c\uc0dd \uc2dc \uc801\uc808\ud558\uac8c \ub300\ucc98\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.1.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.1", "me": 3, "text": "\uc2ec\ud3d0\uc18c\uc0dd\uc220\uc744 \uc704\ud55c \ud544\uc694\ubb3c\ud488 \ubc0f \uc758\uc57d\ud488\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.1.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.1", "me": 4, "text": "\uc801\uc2dc\uc5d0 \uc81c\uc138\ub3d9\uae30\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc788\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.1.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.2", "me": 1, "text": "\uc218\ud608\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.2.2.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.2", "me": 2, "text": "\uc218\ud608 \uc804 \uac80\uc0ac \ubc0f \ud608\uc561 \uac80\uccb4\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.2.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.2", "me": 3, "text": "\ud608\uc561\uc81c\uc81c\ub97c \ubcf4\uad00\ud558\uace0, \uc801\uc808\ud55c \uc2dc\uac04 \ub0b4\uc5d0 \ud658\uc790\uc5d0\uac8c \uc218\ud608\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.2.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.2", "me": 4, "text": "\uc218\ud608 \uc9c1\uc804 \ud608\uc561\uc81c\uc81c \ubc0f \ud658\uc790\ub97c \uc815\ud655\ud558\uac8c \ud655\uc778\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.2.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.2", "me": 5, "text": "\uc218\ud608 \uc2dc \ubaa8\ub2c8\ud130\ub9c1 \ubc0f \ubd80\uc791\uc6a9 \ubc1c\uc0dd \uc2dc \ub300\ucc98\ubc29\uc548\uc744 \uc54c\uace0 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.2.ME5"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.2", "me": 6, "text": "\ud608\uc561\uc81c\uc81c\uc758 \uc785\uace0/\ubd88\ucd9c, \ubc18\ub0a9, \uc7ac\uace0, \ud3d0\uae30\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.2.ME6"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 1, "text": "\uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "3.2.3.ME1"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 2, "text": "\uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9 \uc804 \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.3.ME2"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 3, "text": "\uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9 \uc911\uc778 \ud658\uc790\ub97c \uc815\uae30\uc801\uc73c\ub85c \ud3c9\uac00\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.3.ME3"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 4, "text": "\uc815\uae30\uc801 \ud3c9\uac00\uacb0\uacfc\uc5d0 \ub530\ub77c \uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9\uc744 \uc911\ub2e8\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.3.ME4"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 5, "text": "\uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9 \ud658\uc790\uc5d0\uac8c \ubd80\uc791\uc6a9 \uc608\ubc29\ud65c\ub3d9\uc744 \uc218\ud589\ud558\uace0 \uae30\ub85d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.3.ME5"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 6, "text": "\uc9c1\uc6d0\uc740 \uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9\uc5d0 \uad00\ud55c \uad50\uc721\uc744 \ubc1b\uace0, \uadf8 \ub0b4\uc6a9\uc744 \uc774\ud574\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.3.ME6"}, {"chapter": "3\uc7a5. \ud658\uc790\uc9c4\ub8cc", "standard": "3.2.3", "me": 7, "text": "\uc2e0\uccb4\ubcf4\ud638\ub300 \uc0ac\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud55c \ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "3.2.3.ME7"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.1", "me": 1, "text": "\uc758\uc57d\ud488 \uc120\uc815 \ubc0f \ud655\ubcf4\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc2dc\ubc94", "id": "4.1.ME1"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.1", "me": 2, "text": "\uc758\uc57d\ud488\uc744 \uc120\uc815\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "4.1.ME2"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.1", "me": 3, "text": "\uc758\uc57d\ud488\uc5d0 \uad00\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "4.1.ME3"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.1", "me": 4, "text": "\uc758\uc57d\ud488\uc744 \uc801\uc808\ud558\uac8c \ud655\ubcf4\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "4.1.ME4"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 1, "text": "\uc758\uc57d\ud488 \ubcf4\uad00\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "4.2.ME1"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 2, "text": "\uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ubcf4\uad00\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME2"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 3, "text": "\uc758\uc57d\ud488\uc758 \ubcf4\uad00 \uc0c1\ud0dc\ub97c \uc815\uae30\uc801\uc73c\ub85c \uac10\uc0ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME3"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 4, "text": "\uc751\uae09\uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ubcf4\uad00\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME4"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 5, "text": "\ub9c8\uc57d\ub958\ub97c \uc548\uc804\ud558\uac8c \ubcf4\uad00\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME5"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 6, "text": "\uace0\uc704\ud5d8\uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ubcf4\uad00\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME6"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 7, "text": "\uc8fc\uc758\ub97c \uc694\ud558\ub294 \uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ubcf4\uad00\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME7"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.2", "me": 8, "text": "\uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ud68c\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.2.ME8"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 1, "text": "\uc758\uc57d\ud488 \ucc98\ubc29 \ubc0f \uc870\uc81c\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "4.3.ME1"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 2, "text": "\uc801\uaca9\ud55c \uc790\uac00 \uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ucc98\ubc29\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME2"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 3, "text": "\uc801\uaca9\ud55c \uc790\uac00 \uc758\uc57d\ud488 \uc870\uc81c \uc804\uc5d0 \ucc98\ubc29\uc744 \uac10\uc0ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME3"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 4, "text": "\uc801\uaca9\ud55c \uc790\uac00 \uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uace0 \uccad\uacb0\ud558\uac8c \uc870\uc81c\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME4"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 5, "text": "\uc758\uc57d\ud488 \uc870\uc81c \ud658\uacbd\uc744 \uc548\uc804\ud558\uace0 \uccad\uacb0\ud558\uac8c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME5"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 6, "text": "\uc8fc\uc0ac\uc6a9 \uc758\uc57d\ud488 \ucde8\uae09\uc758 \uac10\uc5fc \ubc0f \uc548\uc804\uad00\ub9ac\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME6"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 7, "text": "\uc801\uaca9\ud55c \uc790\uac00 \uc758\uc57d\ud488 \uc870\uc81c \ud6c4 \uac10\uc0ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME7"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 8, "text": "\uc758\uc57d\ud488 \uc870\uc81c \uc2dc \ub77c\ubca8\ub9c1\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME8"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.3", "me": 9, "text": "\uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \uc6b4\ubc18\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.3.ME9"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.4", "me": 2, "text": "\uc801\uaca9\ud55c \uc790\uac00 \uc758\uc57d\ud488\uc744 \uc548\uc804\ud558\uac8c \ud22c\uc5ec\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.4.ME2"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.4", "me": 4, "text": "\uc801\uaca9\ud55c \uc790\uac00 \ud22c\uc57d \uc124\uba85\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.4.ME4"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.4", "me": 5, "text": "\uc758\uc57d\ud488 \uc0ac\uc6a9 \ud6c4 \uc548\uc804\ud558\uac8c \ud3d0\uae30\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.4.ME5"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.4", "me": 6, "text": "\uc9c0\ucc38\uc57d\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "4.4.ME6"}, {"chapter": "4\uc7a5. \uc758\uc57d\ud488\uad00\ub9ac", "standard": "4.4", "me": 7, "text": "\uc758\uc57d\ud488 \ubd80\uc791\uc6a9 \ubc1c\uc0dd \uc2dc \ubcf4\uace0\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "4.4.ME7"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 1, "text": "\ud658\uc790\uc758 \uad8c\ub9ac\uc640 \uc758\ubb34\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.1.ME1"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 2, "text": "\uc9c1\uc6d0\uc740 \ud658\uc790\uc758 \uad8c\ub9ac\uc640 \uc758\ubb34\ub97c \uc54c\uace0 \uc788\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.1.ME2"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 3, "text": "\ud658\uc790\uc5d0\uac8c \ud658\uc790\uc758 \uad8c\ub9ac\uc640 \uc758\ubb34\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.1.ME3"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 4, "text": "\uc9c4\ub8cc\uacfc\uc815\uc5d0 \ud658\uc790\uac00 \ucc38\uc5ec\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.1.ME4"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 5, "text": "\ud658\uc790\uc758 \uc0ac\uc0dd\ud65c\ubcf4\ud638 \uc694\uad6c\ub97c \ud655\uc778\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.1.ME5"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 6, "text": "\ud658\uc790\uc758 \uc2e0\uccb4\ub178\ucd9c\uc744 \ubcf4\ud638\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.1.ME6"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.1", "me": 7, "text": "\ud658\uc790\uc758 \uac1c\uc778\uc815\ubcf4\ub97c \ubcf4\ud638\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.1.ME7"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 1, "text": "\ucde8\uc57d\ud658\uc790\uc758 \uad8c\ub9ac\ubcf4\ud638\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\ud544\uc218", "id": "5.2.ME1"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 2, "text": "\uc9c1\uc6d0\uc740 \uc758\uc0ac\uc18c\ud1b5\uc774 \uc5b4\ub824\uc6b4 \ud658\uc790\ub97c \uc704\ud55c \uc9c0\uc6d0\uccb4\uacc4\ub97c \uc54c\uace0 \uc788\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "5.2.ME2"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 3, "text": "\uc9c1\uc6d0\uc740 \ud559\ub300 \ubc0f \ud3ed\ub825\ud53c\ud574\uc790 \ubc1c\uc0dd \uc2dc \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\ud544\uc218", "id": "5.2.ME3"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 4, "text": "\ud559\ub300 \ubc0f \ud3ed\ub825\ud53c\ud574\uc790 \ubc1c\uc0dd \uc2dc \uacbd\uc601\uc9c4\uc5d0\uac8c \ubcf4\uace0\ud558\uace0 \uac1c\uc120\ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.2.ME4"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 5, "text": "\ud559\ub300 \ubc0f \ud3ed\ub825 \uc608\ubc29\ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.2.ME5"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 6, "text": "\uc9c1\uc6d0\uc740 \ud559\ub300 \ubc0f \ud3ed\ub825 \ub300\uc751\uccb4\uacc4, \uc608\ubc29\ud65c\ub3d9\uc5d0 \uad00\ud55c \uad50\uc721\uc744 \ubc1b\uace0, \uadf8 \ub0b4\uc6a9\uc744 \uc774\ud574\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.2.ME6"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 7, "text": "\ud559\ub300 \ubc0f \ud3ed\ub825 \uc2e0\uace0\uc808\ucc28\uc5d0 \ub300\ud574 \uc548\ub0b4\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.2.ME7"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.2", "me": 8, "text": "\uac70\ub3d9\uc774 \ubd88\ud3b8\ud55c \ud658\uc790\uc758 \ud3b8\uc758\ub97c \uc704\ud55c \uc2dc\uc124\uc744 \uad6c\ube44\ud558\uace0, \uc9c1\uc6d0\uc740 \uc774\ub97c \uc54c\uace0 \uc788\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.2.ME8"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.3", "me": 1, "text": "\ud658\uc790\uc758 \ubd88\ub9cc \ubc0f \uace0\ucda9 \uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.3.ME1"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.3", "me": 2, "text": "\ud658\uc790\uc5d0\uac8c \ubd88\ub9cc \ubc0f \uace0\ucda9 \ucc98\ub9ac \uc808\ucc28\uc5d0 \ub300\ud55c \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.3.ME2"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.3", "me": 3, "text": "\ubd88\ub9cc \ubc0f \uace0\ucda9\uc0ac\ud56d\uc744 \ucc98\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.3.ME3"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.3", "me": 4, "text": "\ud658\uc790\uc758 \ubd88\ub9cc \ubc0f \uace0\ucda9\uc0ac\ud56d\uc744 \uc815\uae30\uc801\uc73c\ub85c \ubd84\uc11d\ud558\uc5ec \uac1c\uc120\ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.3.ME4"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.4", "me": 1, "text": "\uc758\ub8cc\uc0ac\ud68c\ubcf5\uc9c0\uccb4\uacc4\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.4.ME1"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.4", "me": 2, "text": "\uc9c1\uc6d0\uc740 \uc758\ub8cc\uc0ac\ud68c\ubcf5\uc9c0 \uc11c\ube44\uc2a4 \uc758\ub8b0 \uac00\ub2a5 \ub300\uc0c1 \ubc0f \uc758\ub8b0\uc808\ucc28\ub97c \uc54c\uace0 \uc788\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.4.ME2"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.4", "me": 3, "text": "\uc758\ub8cc\uc0ac\ud68c\ubcf5\uc9c0 \uc11c\ube44\uc2a4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.4.ME3"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.5", "me": 1, "text": "\uc9c4\ub8cc\ub3d9\uc758\uc11c\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.5.ME1"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.5", "me": 2, "text": "\uc2dc\uc220 \ub3d9\uc758\uc11c\ub97c \ubc1b\ub294\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.5.ME2"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.5", "me": 3, "text": "\ud608\uc561\uc81c\uc81c \uc0ac\uc6a9\ub3d9\uc758\uc11c\ub97c \ubc1b\ub294\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.5.ME3"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.5", "me": 4, "text": "\uace0\uc704\ud5d8\uc758\uc57d\ud488 \uc0ac\uc6a9\ub3d9\uc758\uc11c\ub97c \ubc1b\ub294\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "5.5.ME4"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.6", "me": 1, "text": "\uc785\uc6d0\uc2e4 \uc801\uc815\uba74\uc801 \ubc0f \ubcd1\uc0c1 \uc218\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "S", "grade": "\ud544\uc218", "id": "5.6.ME1"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.6", "me": 2, "text": "\ud658\uc790 \ud3b8\uc758 \ubc0f \uc548\uc804\uc744 \uc704\ud55c \uc2dc\uc124\uc744 \uad6c\ube44\ud55c\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.6.ME2"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.6", "me": 3, "text": "\ubcd1\uc6d0\uc6a9 \uc5d8\ub9ac\ubca0\uc774\ud130\ub97c \uc124\uce58\ud55c\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.6.ME3"}, {"chapter": "5\uc7a5. \ud658\uc790 \uad8c\ub9ac\uc874\uc911 \ubc0f \ubcf4\ud638", "standard": "5.6", "me": 4, "text": "\ud720\uccb4\uc5b4 \ubc0f \ubcd1\uc0c1 \uc774\ub3d9 \uacf5\uac04\uc744 \ud655\ubcf4\ud55c\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "5.6.ME4"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.1", "me": 1, "text": "\uc9c8 \ud5a5\uc0c1\uacfc \ud658\uc790\uc548\uc804\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "6.1.ME1"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.1", "me": 2, "text": "\uc9c8 \ud5a5\uc0c1\uacfc \ud658\uc790\uc548\uc804\uc744 \uc704\ud55c \uc704\uc6d0\ud68c\ub97c \uc6b4\uc601\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.1.ME2"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.1", "me": 3, "text": "\uc9c8 \ud5a5\uc0c1\uacfc \ud658\uc790\uc548\uc804 \ud65c\ub3d9\uc744 \uc218\ud589\ud558\ub294 \ubd80\uc11c \ubc0f \uc801\uaca9\ud55c \uc790\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "6.1.ME3"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.1", "me": 4, "text": "\uc9c8 \ud5a5\uc0c1\uacfc \ud658\uc790\uc548\uc804 \ud65c\ub3d9 \uacc4\ud68d\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "6.1.ME4"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.1", "me": 5, "text": "\uc9c8 \ud5a5\uc0c1\uacfc \ud658\uc790\uc548\uc804 \ud65c\ub3d9\uc744 \uc704\ud574 \ud544\uc694\ud55c \uc790\uc6d0\uc744 \uc9c0\uc6d0\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.1.ME5"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 1, "text": "\ud658\uc790\uc548\uc804\uc0ac\uac74 \uad00\ub9ac \uc808\ucc28\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "6.2.ME1"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 2, "text": "\uc9c1\uc6d0\uc740 \ud658\uc790\uc548\uc804\uc0ac\uac74\uc758 \uc815\uc758\ub97c \uc54c\uace0 \ubc1c\uc0dd \uc2dc \ubcf4\uace0\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.2.ME2"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 3, "text": "\ubcf4\uace0\ub41c \ud658\uc790\uc548\uc804\uc0ac\uac74\uc744 \ubd84\ub958\ud558\uace0 \ubd84\uc11d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.2.ME3"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 4, "text": "\ud658\uc790\uc548\uc804\uc0ac\uac74 \ubd84\uc11d\uacb0\uacfc\uc5d0 \ub530\ub77c \uac1c\uc120\ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.2.ME4"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 5, "text": "\ud658\uc790\uc548\uc804\uc0ac\uac74\uc5d0 \ub300\ud55c \uacb0\uacfc\ub97c \uacbd\uc601\uc9c4\uc5d0\uac8c \ubcf4\uace0\ud558\uace0 \uad00\ub828 \uc9c1\uc6d0\uacfc \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.2.ME5"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 6, "text": "\uc801\uc2e0\ud638\uc0ac\uac74 \ubc1c\uc0dd \uc2dc \ud658\uc790\uc640 \ubcf4\ud638\uc790\uc5d0\uac8c \uad00\ub828 \uc815\ubcf4\ub97c \uc81c\uacf5\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "6.2.ME6"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.2", "me": 7, "text": "\ud658\uc790\uc548\uc804 \uc8fc\uc758\uacbd\ubcf4 \ubc1c\ub839 \uc2dc \uad00\ub828 \uc9c1\uc6d0\uacfc \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.2.ME7"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.3", "me": 1, "text": "\uc9c8 \ud5a5\uc0c1 \ud65c\ub3d9\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "6.3.ME1"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.3", "me": 2, "text": "\uc758\ub8cc\uae30\uad00\uc5d0\uc11c \uc120\uc815\ud55c \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9\ubc29\ubc95\uc744 \uc0ac\uc6a9\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.3.ME2"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.3", "me": 3, "text": "\uc120\uc815\ub41c \uc8fc\uc81c\uc5d0 \ub530\ub978 \ud1b5\uacc4\uc801 \uae30\ubc95\uacfc \ub3c4\uad6c\ub97c \uc0ac\uc6a9\ud558\uc5ec \uc790\ub8cc\ub97c \ubd84\uc11d\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "6.3.ME3"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.3", "me": 4, "text": "\uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9\uc744 \ud1b5\ud574 \uc5bb\uc740 \uc131\uacfc\ub97c \uc9c0\uc18d\uc801\uc73c\ub85c \uad00\ub9ac\ud55c\ub2e4.", "type": "O", "grade": "\uc2dc\ubc94", "id": "6.3.ME4"}, {"chapter": "6\uc7a5. \uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9", "standard": "6.3", "me": 5, "text": "\uc9c8 \ud5a5\uc0c1 \ubc0f \ud658\uc790\uc548\uc804 \ud65c\ub3d9\uc131\uacfc\ub97c \uacbd\uc601\uc9c4\uc5d0\uac8c \ubcf4\uace0\ud558\uace0 \uad00\ub828 \uc9c1\uc6d0\uacfc \uacf5\uc720\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "6.3.ME5"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.1", "me": 1, "text": "\uac10\uc5fc\uc608\ubc29 \ubc0f \uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.1.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.1", "me": 2, "text": "\uac10\uc5fc\uc608\ubc29 \ubc0f \uad00\ub9ac\ub97c \uc704\ud55c \uc704\uc6d0\ud68c\ub97c \uc6b4\uc601\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.1.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.1", "me": 3, "text": "\uac10\uc5fc\uc608\ubc29 \ubc0f \uad00\ub9ac\ud65c\ub3d9\uc744 \uc218\ud589\ud558\ub294 \ubd80\uc11c \ubc0f \uc801\uaca9\ud55c \uc790\uac00 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.1.ME3"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.2", "me": 1, "text": "\uc758\ub8cc\uae30\uad6c \uad00\ub828 \uac10\uc5fc\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.2.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.2", "me": 2, "text": "\ud638\ud761\uae30 \uce58\ub8cc\uae30\uad6c \uad00\ub828 \uac10\uc5fc\uad00\ub9ac\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.2.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.2", "me": 3, "text": "\uc720\uce58\ub3c4\ub1e8\uad00 \uad00\ub828 \uac10\uc5fc\uad00\ub9ac\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.2.ME3"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.2", "me": 4, "text": "\ud608\uad00 \ub0b4 \uce74\ud14c\ud130 \uad00\ub828 \uac10\uc5fc\uad00\ub9ac\ub97c \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.2.ME4"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 1, "text": "\uc758\ub8cc\uae30\uad6c\uc758 \uc138\ucc99, \uc18c\ub3c5, \uba78\uade0\uacfc\uc815\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.3.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 2, "text": "\uc138\ucc99, \uc18c\ub3c5, \uba78\uade0 \uc218\ud589\uc5d0 \uc801\uc808\ud55c \uc18c\ub3c5\uc2dc\uc124\uc744 \uac16\ucd94\uace0 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.3.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 3, "text": "\uc0ac\uc6a9\ud55c \uc758\ub8cc\uae30\uad6c\uc758 \uc138\ucc99, \uc18c\ub3c5, \uba78\uade0\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.3.ME3"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 4, "text": "\uba78\uade0\uae30\ub97c \uc815\uae30\uc801\uc73c\ub85c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.3.ME4"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 5, "text": "\uba78\uade0\ubb3c\ud488\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.3.ME5"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 6, "text": "\uc138\ud0c1\ubb3c \uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.3.ME6"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.3", "me": 7, "text": "\uc138\ud0c1\ubb3c\uc744 \uc801\uc808\ud558\uac8c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.3.ME7"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.4", "me": 1, "text": "\ud658\uc790\uce58\ub8cc\uc601\uc5ed\uc758 \ud658\uacbd\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.4.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.4", "me": 2, "text": "\ud658\uc790\uce58\ub8cc\uc601\uc5ed\uc758 \uccad\uc18c \ubc0f \uc18c\ub3c5\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.4.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.4", "me": 3, "text": "\uc758\ub8cc\uae30\uad00 \ub0b4 \uc74c\uc6a9\uc218\ub97c \uc801\uc808\ud558\uac8c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.4.ME3"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.5", "me": 1, "text": "\ub0b4\uc2dc\uacbd\uc2e4\uc758 \uac10\uc5fc\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.5.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.5", "me": 2, "text": "\ub0b4\uc2dc\uacbd\uacfc \ub0b4\uc2dc\uacbd \ubd80\uc18d\uae30\uad6c\uc758 \uc138\ucc99, \uc18c\ub3c5, \uba78\uade0\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.5.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.5", "me": 3, "text": "\ub0b4\uc2dc\uacbd \ubc0f \ub0b4\uc2dc\uacbd \ubd80\uc18d\uae30\uad6c\ub97c \uc801\uc808\ud558\uac8c \ubcf4\uad00\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.5.ME3"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.5", "me": 4, "text": "\uc778\uacf5\uc2e0\uc7a5\uc2e4\uc758 \uac10\uc5fc\uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.5.ME4"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.5", "me": 5, "text": "\ud22c\uc11d\uae30 \ubc0f \ud658\uacbd\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.5.ME5"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.5", "me": 6, "text": "\ud22c\uc11d\uc6a9\uc218 \ubc0f \ud22c\uc11d\uc561\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.5.ME6"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.6", "me": 1, "text": "\uc785\uc6d0\ud658\uc790 \uae09\uc2dd\uc11c\ube44\uc2a4 \uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.6.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.6", "me": 2, "text": "\uc2dd\uc7ac\ub8cc\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.6.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.6", "me": 3, "text": "\uc870\ub9ac\uae30\uad6c \ubc0f \uc7a5\ube44\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.6.ME3"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.6", "me": 4, "text": "\uc870\ub9ac\uc7a5 \ud658\uacbd\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.6.ME4"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.6", "me": 5, "text": "\uc9c1\uc6d0\uc758 \uac1c\uc778\uc704\uc0dd\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.6.ME5"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.7", "me": 1, "text": "\uac10\uc5fc\uc131\uc9c8\ud658 \uad00\ub9ac\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "7.7.ME1"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.7", "me": 2, "text": "\uc720\ud589\uc131 \uac10\uc5fc\ubcd1 \uc704\uae30 \uc0c1\ud669 \uc2dc \uad00\ub9ac \uc808\ucc28\ub97c \uc900\uc218\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.7.ME2"}, {"chapter": "7\uc7a5. \uac10\uc5fc\uad00\ub9ac", "standard": "7.7", "me": 3, "text": "\uac10\uc5fc\ubcd1 \uc804\ud30c\uacbd\ub85c\uc5d0 \ub530\ub978 \uc808\ucc28\ub97c \uc900\uc218\ud558\uc5ec \ud658\uc790\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "7.7.ME3"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.1", "me": 1, "text": "\uc758\ub8cc\uae30\uad00 \uc6b4\uc601\uc5d0 \ub300\ud55c \uaddc\uc815\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "8.1.ME1"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.1", "me": 2, "text": "\uc758\uc0ac\uacb0\uc815\uc870\uc9c1(\ud68c\uc758\uccb4)\uc744 \uc6b4\uc601\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "8.1.ME2"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.1", "me": 3, "text": "\uaddc\uc815(\uc815\ucc45\uacfc \uc808\ucc28)\uc744 \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "8.1.ME3"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.1", "me": 4, "text": "\uacbd\uc601\uc9c4\uc740 \uc704\ud0c1\uc11c\ube44\uc2a4\ub97c \uad00\ub9ac\ud55c\ub2e4.", "type": "P", "grade": "\uc2dc\ubc94", "id": "8.1.ME4"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.2", "me": 1, "text": "\ubbf8\uc158\uc774 \uc788\ub2e4.", "type": "S", "grade": "\uc815\uaddc", "id": "8.2.ME1"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.2", "me": 2, "text": "\ubbf8\uc158\uc744 \uacf5\uc9c0\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "8.2.ME2"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.2", "me": 3, "text": "\ubbf8\uc158\uc744 \uc774\ud589\ud558\uae30 \uc704\ud55c \ud65c\ub3d9\uc744 \uc218\ud589\ud55c\ub2e4.", "type": "P", "grade": "\uc815\uaddc", "id": "8.2.ME3"}, {"chapter": "8\uc7a5. \uacbd\uc601 \ubc0f \uc870\uc9c1\uc6b4\uc601", "standard": "8.2", "me": 4, "text": "\uc9c1\uc6d0\uc740 \ubbf8\uc158\uc744 \uc   var v=getV();var avg=v.avg;
  var pct=avg!==null?avg/10:0;var len=157;
  var clr=avg===null?"#e2e8f0":avg>=8?"#10b981":avg>=7?"#f59e0b":"#ef4444";
  el("gaugePath").setAttribute("stroke-dasharray",(pct*len)+" "+((1-pct)*len));
  el("gaugePath").setAttribute("stroke",clr);
  el("gaugeNum").textContent=avg!==null?avg.toFixed(1):"-";
  el("gaugeSub").textContent=avg!==null?"/ 10.0\uc810":"\uc785\ub825 \ub300\uae30 \uc911";
  var inp=MD.filter(function(i){return i.grade!="\uc2dc\ubc94"&&SC[i.id]!=null;}).length>0;
  function setC(n,val,ok){
    var b=el("c"+n+"b"),v2=el("c"+n+"v");
    if(v2)v2.textContent=val;
    if(b){if(!inp){b.textContent="\ub300\uae30";b.className="cbadge cb-wait";}else if(ok){b.textContent="\u2713 \ucda9\uc871";b.className="cbadge cb-ok";}else{b.textContent="\u2717 \uc704\ud5d8";b.className="cbadge cb-fail";}}
  }
  setC(1,avg!==null?avg.toFixed(2)+"\uc810":"-",avg!==null&&avg>=8);
  setC(2,v.sf.length+"\uac1c",v.sf.length<3);
  setC(3,v.cf.length+"\uac1c",v.cf.length===0);
  setC(4,v.rf.length+"\uac1c",v.rf.length===0);
  var sang=0,jung=0,ha=0,mi=0;
  MD.forEach(function(i){var s=SC[i.id];if(s=="\uc0c1")sang++;else if(s=="\uc911")jung++;else if(s=="\ud558")ha++;else if(s=="\ubbf8\ud574\ub2f9")mi++;});
  var tot=sang+jung+ha;
  function ps(n){return tot>0?"\uc804\uccb4\uc758 "+Math.round(n/tot*100)+"%":"-";}
  el("cnt-sang").textContent=sang;el("cnt-jung").textContent=jung;el("cnt-ha").textContent=ha;el("cnt-mi").textContent=mi;
  el("cnt-sang-p").textContent=ps(sang);el("cnt-jung-p").textContent=ps(jung);el("cnt-ha-p").textContent=ps(ha);
  var bh="";
  CHO.forEach(function(ch,ci){
    var a=chAvg(ch);var h=a!==null?Math.round(a/10*100):0;
    var c=a===null?"#e2e8f0":a>=7?"#10b981":a>=5?"#f59e0b":"#ef4444";
    bh+="<div class=\"bar-wrap\"><div class=\"bar-val\" style=\"color:"+(a===null?"#ccc":c)+"\">"+(a!==null?a.toFixed(1):"-")+"<\/div><div class=\"bar\" style=\"height:"+h+"px;background:"+c+"\"><\/div><div class=\"bar-lbl\">"+CHS[ci]+"<\/div><\/div>";
  });
  el("barChart").innerHTML=bh;
  var dz="";
  if(v.rf.length>0){dz+="<div class=\"danger-box\"><div class=\"danger-title\">\ud83d\udea8 \ud544\uc218\ud56d\ubaa9 \ud558 \u2014 \uc989\uc2dc \ud655\uc778 \ud544\uc694 ("+v.rf.length+"\uac1c)<\/div>";v.rf.forEach(function(i){dz+="<div class=\"warn-item\">&bull; ["+i.standard+" ME"+i.me+"] "+i.text+"<\/div>";});dz+="<\/div>";}
  if(v.cf.length>0){dz+="<div class=\"warn-box\"><div class=\"warn-title\">\u26a0\ufe0f \uc7a5 \ud3c9\uade07 7\uc810 \ubbf8\ub9cc \u2014 \ubd88\uc778\uc99d \uc870\uac74 ("+v.cf.length+"\uac1c)<\/div>";v.cf.forEach(function(ch){dz+="<div class=\"warn-item\">&bull; "+ch+": <strong>"+chAvg(ch).toFixed(1)+"\uc810<\/strong><\/div>";});dz+="<\/div>";}
  el("dangerZone").innerHTML=dz;
  var hi=MD.filter(function(i){return SC[i.id]=="\ud558"&&i.grade!="\ud544\uc218";});
  var hz="";
  if(hi.length>0){hz="<div class=\"warn-box\"><div class=\"warn-title\">\u26a0\ufe0f \ud558 \ud56d\ubaa9 \u2014 \uac1c\uc120 \ud544\uc694 ("+hi.length+"\uac1c)<\/div>";hi.forEach(function(i){hz+="<div class=\"warn-item\">&bull; ["+i.standard+" ME"+i.me+"] "+i.text+"<\/div>";});hz+="<\/div>";}
  el("haZone").innerHTML=hz;
}
function updateNav(){
  CHO.forEach(function(ch,i){
    var a=chAvg(ch);
    var dot=el("dot-"+i);if(dot)dot.style.background=a===null?"#cbd5e1":a>=7?"#10b981":a>=5?"#f59e0b":"#ef4444";
    var items=[];Object.keys(ST[ch]).forEach(function(std){ST[ch][std].forEach(function(it){if(it.grade!="\uc2dc\ubc94")items.push(it);});});
    var done=items.filter(function(it){return SC[it.id]!=null;}).length;
    var prog=el("prog-"+i);if(prog)prog.textContent=done+"/"+items.length;
  });
}
function updChHdr(itemId){
  var item=null;for(var k=0;k<MD.length;k++){if(MD[k].id===itemId){item=MD[k];break;}}if(!item)return;
  var ch=item.chapter;var ci=CHO.indexOf(ch);var avg=chAvg(ch);
  var badge=el("chb-"+ci);if(badge){badge.textContent=avg!==null?avg.toFixed(1)+"\uc810":"\ubbf8\uc785\ub825";badge.className="ch-badge "+(avg===null?"b-none":avg>=7?"b-ok":avg>=5?"b-warn":"b-bad");}
  var items=[];Object.keys(ST[ch]).forEach(function(std){ST[ch][std].forEach(function(it){if(it.grade!="\uc2dc\ubc94")items.push(it);});});
  var done=items.filter(function(it){return SC[it.id]!=null;}).length;
  var fill=el("chf-"+ci);if(fill)fill.style.width=Math.round(done/items.length*100)+"%";
  if(ST[ch][item.standard]){var sid="sa-"+item.standard.replace(/\./g,"_");var se=el(sid);if(se){var a=stdAvg(ST[ch][item.standard]);se.textContent=a!==null?a.toFixed(1)+"\uc810":"-";se.className="std-avg"+(a===null?"":a<5?" bad":" ok");}}
}
function setScore(id,val){
  SC[id]=val;
  var row=el("r-"+id);
  if(row){row.querySelectorAll(".sbtn").forEach(function(b){b.className="sbtn"+(SC[id]===b.dataset.v?" on-"+{"\uc0c1":"sang","\uc911":"jung","\ud558":"ha","\ubbf8\ud574\ub2f9":"mi"}[SC[id]]:"");});}
  updChHdr(id);updateAll();
}
function setNA(std,ch){
  var items=ST[ch][std];if(!items)return;
  var allNA=items.every(function(i){return SC[i.id]=="\ubbf8\ud574\ub2f9";});
  items.forEach(function(item){
    SC[item.id]=allNA?"\uc0c1":"\ubbf8\ud574\ub2f9";
    var row=el("r-"+item.id);
    if(row)row.querySelectorAll(".sbtn").forEach(function(b){b.className="sbtn"+(SC[item.id]===b.dataset.v?" on-"+{"\uc0c1":"sang","\ubbf8\ud574\ub2f9":"mi"}[SC[item.id]]:"");});
  });
  var btn=el("na-"+std.replace(/\./g,"_"));if(btn)btn.textContent=allNA?"\uc804\uccb4 \ubbf8\ud574\ub2f9":"\u21a9 \ubbf8\ud574\ub2f9 \ud574\uc81c";
  if(items.length>0)updChHdr(items[0].id);updateAll();
}
function togCh(i){
  var body=el("chbody-"+i);var tog=el("chtog-"+i);
  var closed=body.style.display==="none";
  body.style.display=closed?"":"none";
  tog.classList.toggle("closed",!closed);
}
function scrollCh(i){showTab("in");setTimeout(function(){var e=el("ch-"+i);if(e)e.scrollIntoView({behavior:"smooth",block:"start"});},100);}
function renderInput(){
  var nh="";
  CHO.forEach(function(ch,i){
    var items=[];Object.keys(ST[ch]).forEach(function(std){ST[ch][std].forEach(function(it){if(it.grade!="\uc2dc\ubc94")items.push(it);});});
    nh+="<div class=\"nav-item\" onclick=\"scrollCh("+i+")\">"+"<div class=\"nav-dot\" id=\"dot-"+i+"\" style=\"background:#cbd5e1\"><\/div>"+"<span style=\"flex:1\">"+ch+"<\/span>"+"<span class=\"nav-prog\" id=\"prog-"+i+"\">0\/"+items.length+"<\/span><\/div>";
  });
  el("chNav").innerHTML=nh;
  var ch2="";
  CHO.forEach(function(ch,ci){
    ch2+="<div class=\"ch-card\" id=\"ch-"+ci+"\"><div class=\"ch-hdr\" onclick=\"togCh("+ci+")\">"+"<h3>"+ch+"<\/h3><span class=\"ch-badge b-none\" id=\"chb-"+ci+"\">\ubbf8\uc785\ub825<\/span><span class=\"ch-tog\" id=\"chtog-"+ci+"\">\u25bc<\/span><\/div>"+"<div class=\"ch-prog\"><div class=\"ch-prog-fill\" id=\"chf-"+ci+"\" style=\"width:0%\"><\/div><\/div>"+"<div id=\"chbody-"+ci+"^\">";
    Object.keys(ST[ch]).forEach(function(std){
      var items=ST[ch][std];var sid="sa-"+std.replace(/\./g,"_");var nid="na-"+std.replace(/\./g,"_");
      ch2+="<div class=\"std-hdr\"><span class=\"std-nm\">\uae30\uc900 "+std+"<\/span><button class=\"na-btn\" id=\""+nid+"\" onclick=\"setNA('"+std+"','"+ch+"')\">\uc804\uccb4 \ubbf8\ud574\ub2f9<\/button><span class=\"std-avg\" id=\""+sid+"\">-<\/span><\/div>";
      items.forEach(function(item){
        var s=SC[item.id];var isMust=item.grade=="\ud544\uc218";var isTrial=item.grade=="\uc2dc\ubc94";
        var cls="me-row"+(isMust?" is-must":"")+(isTrial?" is-trial":"");
        var sang_cls=s=="\uc0c1"?" on-sang":"";var jung_cls=s=="\uc211"?" on-jung":"";var ha_cls=s=="\ud558"?" on-ha":"";var mi_cls=s=="\ubbf8\ud574\ub2f9"?" on-mi":"";
        ch2+="<div class=\""+cls+"\" id=\"r-"+item.id+"\">"
          +"<span class=\"me-no\">ME"+item.me+"<\/span>"
          +"<span class=\"me-txt\">"+item.text+"<\/span>"
          +"<div class=\"me-tags\"><span class=\"mtag mt-"+item.type+"\">"+item.type+"<\/span>"+(isMust?"<span class=\"mtag mt-must\">\ud544\uc218<\/span>":"")+(isTrial?"<span class=\"mtag mt-trial\">\uc2dc\ubc94<\/span>":"")+"<\/div>"
          +"<div class=\"sbtns\">"
          +"<button class=\"sbtn"+sang_cls+"\" data-v=\"\uc0c1\" onclick=\"setScore('"+item.id+"','\uc0c1\')\">\uc0c1<\/button>"
          +"<button class=\"sbtn"+jung_cls+"\" data-v=\"\uc211\" onclick=\"setScore('"+item.id+"','\uc211\')\">\uc911<\/button>"
          +"<button class=\"sbtn"+ha_cls+"\" data-v=\"\ud558\" onclick=\"setScore('"+item.id+"','\ud558\')\">\ud558<\/button>"
          +"<button class=\"sbtn"+mi_cls+"\" data-v=\"\ubbf8\ud574\ub2f9\" onclick=\"setScore('"+item.id+"','\ubbf8\ud574\ub2f9')\">-<\/button>"
          +"<\/div><\/div>";
      });
    });
    ch2+="<\/div><\/div>";
  });
  el("chapArea").innerHTML=ch2.replace(/\^/g,"");
}
function renderAn(){
  var h="";
  CHO.forEach(function(ch){
    var avg=chAvg(ch);var clr=avg===null?"#94a3b8":avg>=7?"#10b981":avg>=5?"#f59e0b":"#ef4444";
    h+="<div class=\"an-card\"><div class=\"an-hdr\"><div class=\"an-title\">"+ch+"<\/div><div class=\"an-score\" style=\"color:"+clr+"\">"+(avg!==null?avg.toFixed(1):"-")+"<\/div><\/div>"+"<div class=\"an-prog\"><div class=\"an-fill\" style=\"width:"+(avg!==null?avg/10*100:0)+"%;background:"+clr+"\"><\/div><\/div><div class=\"an-body\">";
    Object.keys(ST[ch]).forEach(function(std){
      var items=ST[ch][std];var a=stdAvg(items);var c=a===null?"#94a3b8":a>=5?"#10b981":"#ef4444";
      var sc=items.filter(function(i){return i.grade!="\uc2dc\ubc94"&&SC[i.id]!=null;}).length;
      var tc=items.filter(function(i){return i.grade!="\uc2dc\ubc94";}).length;
      h+="<div class=\"std-row2\"><div class=\"std-nm2\">"+std+"<\/div><div class=\"std-bar\"><div class=\"std-bar-fill\" style=\"width:"+(a!==null?a/10*100:0)+"%;background:"+c+"\"><\/div><\/div><div class=\"std-sc2\" style=\"color:"+c+"\">"+(a!==null?a.toFixed(1):"-")+"<\/div><div class=\"std-cnt\">"+sc+"\/"+tc+"<\/div><\/div>";
    });
    h+="<\/div><\/div>";
  });
  el("anGrid").innerHTML=h;
}
function doSave(){
  var data={hospital:el("hospName").value,scores:SC,savedAt:new Date().toLocaleString("ko-KR")};
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
  a.download="\uc694\uc591\ubcd1\uc6d0\uc778\uc99d_"+(data.hospital||"\ubbf8\uc785\ub825")+"_"+new Date().toISOString().slice(0,10)+".json";a.click();
}
function doLoad(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{var d=JSON.parse(ev.target.result);var s=d.scores||d;Object.keys(s).forEach(function(k){SC[k]=s[k];});
    if(d.hospital)el("hospName").value=d.hospital;
    MD.forEach(function(item){var row=el("r-"+item.id);if(!row)return;row.querySelectorAll(".sbtn").forEach(function(b){var v=SC[item.id];b.className="sbtn"+(v===b.dataset.v?" on-"+{"\uc0c1":"sang","\uc211":"jung","\ud558":"ha","\ubbf8\ud574\ub2f9":"mi"}[v]:"");});updChHdr(item.id);});
    updateAll();alert("\ubd88\ub7ec\uc624\uae30 \uc644\ub8cc! ("+(d.savedAt||"")+")");
    }catch(e2){alert("\ud30c\uc77c\uc744 \uc77d\uc744 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.");}
  };r.readAsText(file);e.target.value="";
}
function doReset(){
  if(!confirm("\ubaa8\ub4e0 \uc785\ub825\uac12\uc744 \ucd08\uae30\ud654\ud560\uae4c\uc694?"))return;
  MD.forEach(function(item){SC[item.id]="\uc0c1";var row=el("r-"+item.id);if(!row)return;row.querySelectorAll(".sbtn").forEach(function(b){b.className="sbtn"+(b.dataset.v=="\uc0c1"?" on-sang":"");});updChHdr(item.id);});
  el("hospName").value="";updateAll();
}
el("btnSave").onclick=doSave;
el("btnLoad").onclick=function(){el("fi").click();};
el("btnReset").onclick=doReset;
el("fi").onchange=doLoad;
renderInput();updateAll();
</script>
